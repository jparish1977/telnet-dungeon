<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler of Doom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #viewport {
            flex: 1;
            position: relative;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
        #hud .hp { color: #00ff00; }
        #hud .mp { color: #00ccff; }
        #hud .gold { color: #ffcc00; }
        #log {
            height: 120px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid #333;
            padding: 8px;
            overflow-y: auto;
            font-size: 13px;
        }
        #log p { margin: 2px 0; }
        #controls {
            background: #111;
            border-top: 1px solid #333;
            padding: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #controls input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 4px 8px;
            outline: none;
        }
        #status {
            background: #0d0d0d;
            border-top: 1px solid #222;
            padding: 4px 10px;
            font-size: 12px;
            color: #666;
        }
        .disconnected { color: #ff3333 !important; }
        .connected { color: #33ff33 !important; }
    </style>
</head>
<body>
    <div id="app">
        <div id="viewport">
            <canvas id="game-canvas"></canvas>
            <div id="hud"></div>
        </div>
        <div id="log"></div>
        <div id="controls">
            <span style="color:#666">&gt;</span>
            <input type="text" id="input" autocomplete="off" autofocus placeholder="Type command...">
        </div>
        <div id="status">
            <span id="conn-status" class="disconnected">Disconnected</span>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
